# ──────────────────────────────────────────────────────────────────────────────
# Orator runtime configuration
#
# Loading order (later overrides earlier):
#   1. Compile-time defaults (C++ struct initializers)
#   2. This file
#   3. Environment variables (ORATOR_*)
#   4. CLI arguments (port, diarizer weights, ASR model dir)
#
# TIP: Keep notes as comments next to values you try, e.g.:
#   vad_trail_sec = 1.0    # was 1.5 — v7 fix, tested 120s OK
# ──────────────────────────────────────────────────────────────────────────────

# ══════════════════════════════════════════════════════════════════════════════
# Server — network ports and UI
# ══════════════════════════════════════════════════════════════════════════════
[server]
# WebSocket port (CLI arg overrides)
# port = 8765

# UI HTTP port. 0 = auto (port + 1)
# ui_port = 0

# Static file root for the web UI
# ui_root = "web"

# ══════════════════════════════════════════════════════════════════════════════
# ASR — speech recognition pipeline
# ══════════════════════════════════════════════════════════════════════════════
[asr]
# Model directory path (CLI arg overrides)
# model_dir = "models/asr/Qwen/Qwen3-ASR-1.7B"

# Master switch for VAD-gated processing
# vad_gate = true

# Lead buffer (ms) extracted before VAD speech onset — avoids cutting first syllable
# vad_lead_ms = 200

# Trailing window (seconds) after VAD silence before committing a segment
# Smaller = less trailing silence but may cut early if VAD lags
# We tested: 1.5 (v5/v6), 1.0 (v7) — 16~18 ASR segs / 38 VAD segs
# vad_trail_sec = 1.0

# KV-cache safety cap — max audio tokens before force-finalize a segment
# Crash at ~1768 tokens; 1500 leaves a comfortable margin (~115s audio)
# max_audio_tokens = 1500

# Max decode tokens per segment
# max_new_tokens = 32

# Hard segment cap (seconds) — only active when vad_gate=false
# segment_sec = 24.0

# Language hint ("" = auto-detect)
# language = "Chinese"

# Optional system prompt for ASR decoder
# system_prompt = ""

# Decoder beam ban steps (suppress repetitive n-grams)
# ban_steps = 3

# Decode batch size (parallel token candidates)
# decode_batch = 4

# Enable per-frame ASR timing profile (ORATOR_ASR_PROFILE)
# profile = false

# ══════════════════════════════════════════════════════════════════════════════
# VAD — voice activity detection pipeline
# ══════════════════════════════════════════════════════════════════════════════
[vad]
# Silero VAD model path
# model = "models/vad/silero_vad.safetensors"

# Enable VAD streaming pipeline
# stream = true

# Speech probability threshold (0.0-1.0)
# threshold = 0.5

# Minimum speech duration (ms) — shorter noise bursts are rejected
# min_speech_ms = 250

# Minimum silence (ms) before VAD declares a segment end
# Larger = fewer VAD segments but more trailing silence (async lag)
# We tested: 300 (v7 default), 200 (more VAD splits)
# min_silence_ms = 300

# Speech segment padding (ms) on each side
# speech_pad_ms = 60

# ══════════════════════════════════════════════════════════════════════════════
# Diarization — speaker separation pipeline
# ══════════════════════════════════════════════════════════════════════════════
[diarizer]
# Model weights path (CLI arg overrides). Empty = disable diarization
# model = "models/sortformer_4spk_v2.safetensors"

# Maximum number of speakers
# max_speakers = 4

# Per-speaker activity threshold (0.0-1.0).  Lower = assigns more frames to speakers. (default 0.4, tuned)
# threshold = 0.4

# Merge same-speaker segments closer than this (seconds).  Higher = fewer fragments. (default 0.8, tuned)
# merge_gap_sec = 0.8

# Minimum audio interval between live speaker-view deliveries
# deliver_interval_sec = 1.0

# Sortformer streaming tuning — affects speaker segmentation quality
# Speaker cache length (frames). Larger = more stable speaker identity, slower adaptation. (default 188)
# spkcache_len = 188
# Processing chunk size (frames). Must match spkcache_len for streaming mode. (default 188)
# chunk_len = 188
# Cache update interval (frames). (default 188)
# spkcache_update_period = 188
# Left context chunks. Higher = better context, more compute. (default 1)
# chunk_left_context = 1
# Right context chunks. Higher = better context, more compute. (default 1)
# chunk_right_context = 1
# Silent frames before resetting speaker cache. Higher = fewer speaker splits. (default 3)
# spkcache_sil_frames = 3

# Onset/offset double-threshold post-processing (NeMo-style, default 0.45/0.25)
# onset: probability to START a segment. Higher = fewer, more confident segments.
# offset: probability to END a segment. Lower than onset creates "sticky" segments.
#   offset < onset means an active segment persists through probability dips.
# onset = 0.45
# offset = 0.25

# Extra time before/after each segment (seconds). (default 0.0)
# pad_onset = 0.0
# pad_offset = 0.0

# Minimum segment duration (seconds). Shorter segments are removed. (default 0.5)
# min_dur_on = 0.5

# Minimum gap to merge same-speaker segments (seconds). Larger = fewer fragments. (default 1.0)
# min_dur_off = 1.0

# ══════════════════════════════════════════════════════════════════════════════
# Storage — protocol timeline persistence
# ══════════════════════════════════════════════════════════════════════════════
[storage]
# DISK backend path for protocol timeline
# disk_path = "/tmp/orator/storage/"

# Session persistence directory. Empty = defaults to <disk_path>/sessions/
# session_dir = ""

# ══════════════════════════════════════════════════════════════════════════════
# Telemetry — GPU scheduling metrics
# ══════════════════════════════════════════════════════════════════════════════
[telemetry]
# GPU telemetry push interval (seconds). 0 = disabled.
# gpu_interval_sec = 0.0

# ══════════════════════════════════════════════════════════════════════════════
# Debug — diagnostics and profiling
# ══════════════════════════════════════════════════════════════════════════════
[debug]
# Log level: 0=DEBUG, 1=INFO, 2=WARN, 3=ERROR
# log_level = 2

# Enable timebase consistency checks (ORATOR_TIMEBASE_CHECK)
# timebase_check = false

# Show diarizer streaming progress bar (ORATOR_STREAM_PROGRESS)
# stream_progress = false

# GPU scheduling mode: "auto" (default), "serial" (ORATOR_GPU_SERIAL),
# or "concurrent" (ORATOR_GPU_CONCURRENT)
# gpu_scheduling = "auto"

# ══════════════════════════════════════════════════════════════════════════════
# Debug — ASR model development knobs (read via std::getenv, not via Config)
# ══════════════════════════════════════════════════════════════════════════════
[debug_model]
# Per-token GPU timing (ORATOR_ASR_PROFILE2)
# profile2 = false

# Decode batch override (ORATOR_ASR_BATCH)
# batch = 0

# Decoder profiling (ORATOR_ASR_DECPROF)
# decprof = false

# Disable CUDA graph capture (ORATOR_ASR_NOGRAPH)
# no_graph = false

# Windowed encoder mode (ORATOR_ASR_WINDOWED)
# windowed_encoder = false

# Force cuBLAS GEMV (ORATOR_ASR_CUBLAS_GEMV)
# cublas_gemv = false
