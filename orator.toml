# ──────────────────────────────────────────────────────────────────────────────
# Orator runtime configuration
#
# Loading order (later overrides earlier):
#   1. Compile-time defaults (C++ struct initializers)
#   2. This file
#   3. Environment variables (ORATOR_*)
#   4. CLI arguments (port, diarizer weights, ASR model dir)
#
# TIP: Keep notes as comments next to values you try, e.g.:
#   vad_trail_sec = 1.0    # was 1.5 — v7 fix, tested 120s OK
# ──────────────────────────────────────────────────────────────────────────────

# ══════════════════════════════════════════════════════════════════════════════
# Server — network ports and UI
# ══════════════════════════════════════════════════════════════════════════════
[server]
# WebSocket port (CLI arg overrides)
port = 8765

# UI HTTP port. 0 = auto (port + 1)
ui_port = 0

# Static file root for the web UI
ui_root = "web"

# ══════════════════════════════════════════════════════════════════════════════
# ASR — speech recognition pipeline
# ══════════════════════════════════════════════════════════════════════════════
[asr]
# Model directory path (CLI arg overrides)
model_dir = "models/asr/Qwen/Qwen3-ASR-1.7B"

# Master switch for VAD-gated processing
vad_gate = true

# Lead buffer (ms) extracted before VAD speech onset — avoids cutting first syllable
vad_lead_ms = 200

# Trailing window (seconds) after VAD silence before committing a segment
# Smaller = less trailing silence but may cut early if VAD lags
# We tested: 1.5 (v5/v6), 1.0 (v7) — 16~18 ASR segs / 38 VAD segs
vad_trail_sec = 1.0

# Minimum confirmed VAD speech overlap required to keep a finalized ASR chunk.
# Drops weak tail/silence hallucinations after VAD has confirmed the span.
vad_min_overlap_sec = 0.12

# KV-cache safety cap — max audio tokens before force-finalize a segment
# Crash at ~1768 tokens; 1500 leaves a comfortable margin (~115s audio)
max_audio_tokens = 1500

# Max decode tokens per segment
max_new_tokens = 32

# Hard segment cap (seconds) for finalized ASR chunks. The final comprehensive
# timeline and Web UI handle view segmentation separately; keep this value tuned
# for ASR semantic stability.
# 2026-07-03 600s WS A/B after VAD-overlap filtering: 24s kept 49 ASR finals
# vs 67 at 12s, with the same comprehensive count and better To C wording.
segment_sec = 24.0

# Language hint ("" = auto-detect)
language = "Chinese"

# System prompt for ASR decoder. Keep the accepted prompt explicit so the
# resolved run configuration describes the model input exactly.
system_prompt = "你是一个专业的中文普通话语音识别系统，请准确识别并转录所有语音内容。"

# Decoder beam ban steps (suppress repetitive n-grams)
ban_steps = 3

# Decode batch size (parallel token candidates)
decode_batch = 4

# Enable ASR timing diagnostics
profile = false

# Use trained encoder attention windows instead of full utterance attention.
windowed_encoder = false

# Permit CUDA graph capture when GPU scheduling is serial. Concurrent scheduling
# disables capture automatically because capture is process-global.
cuda_graph_enabled = true

# ══════════════════════════════════════════════════════════════════════════════
# Forced alignment — aligns each finalized ASR transcript segment to its audio,
# producing precise per-word/character timestamps in a single non-autoregressive
# pass (Qwen3-ForcedAligner). Independent pipeline: consumes the published
# asr/transcript only, never ASR internal state.
# ══════════════════════════════════════════════════════════════════════════════
[align]
# Enable the forced-alignment pipeline (also requires model_dir)
enable = true

# Model directory (Qwen3-ForcedAligner-0.6B)
model_dir = "models/ForcedAligner"

# Transcript language (full name, e.g. "Chinese", "English")
language = "Chinese"

# Skip alignment for segments longer than this (seconds) — safety cap
max_segment_sec = 300.0

# Retained audio window (seconds) for span readback. Must exceed the longest
# segment plus the ASR-to-alignment lag, bounded to cap memory.
retain_sec = 180.0

# Enable forced-aligner timing diagnostics
profile = false

# ══════════════════════════════════════════════════════════════════════════════
# Comprehensive timeline — derived who-said-what view on the common time base
# ══════════════════════════════════════════════════════════════════════════════
[timeline]
# Maximum gap between adjacent forced-alignment units that is still treated as
# one coherent utterance run for speaker attribution.
align_snap_pause_sec = 0.25

# Force a run split when a diarization speaker boundary sits this close to an
# alignment-unit gap. This lets real turn changes cut inside one ASR segment
# without splitting ordinary intra-sentence pauses.
align_boundary_split_tolerance_sec = 0.08

# Speaker support diagnostics for comprehensive entries. Attribution is not
# changed by these thresholds; they only label whether the selected speaker has
# enough raw diar coverage to trust the view without manual review.
speaker_support_min_coverage_ratio = 0.50
speaker_support_max_gap_sec = 1.00
speaker_support_max_islands = 1

# Fill an uncovered interval only when the same resolved speaker bounds both
# sides. Disable to preserve every unsupported interval as unknown.
gap_fill_enabled = true

# Equal-overlap diar intervals are resolved with the independent raw top-1
# Sortformer track when that track names exactly one tied identity.
speaker_overlap_tie_policy = "primary_speaker"

# ══════════════════════════════════════════════════════════════════════════════
# Speaker identity — voiceprint enrollment / re-identification (Spec 010)
# Post-diarization stage inside the diarization pipeline: embeds clean
# single-speaker audio with TitaNet-Large and resolves a persistent GLOBAL
# identity per diarizer-local speaker (auto-enroll unseen / re-identify known).
# ══════════════════════════════════════════════════════════════════════════════
[speaker]
# Enable speaker identity (also requires model_dir + the diarizer pipeline)
enable = true

# Directory holding titanet_large.safetensors
model_dir = "models/speaker"

# Spec 013 full acceptance deletes this file before run A, freezes the enrolled
# result, then restarts the process and loads the same fixture for run B.
registry_path = "/tmp/orator/storage/spec013-speakers.bin"

# Cosine threshold for "same speaker" (re-identification). Higher = stricter.
# Ground-truth meeting eval: same-speaker spans ~0.66/0.72 (1.5s/4s), different
# ~0.45, EER ~0.55-0.60; 0.55 is the balanced point. Raise this in a dedicated
# TOML experiment when false global merges are more harmful than local-only ids.
match_threshold = 0.55

# Shortest clean single-speaker span worth embedding (seconds). Longer is
# cleaner: 1.5s->4s halves the meeting EER (21%->13%).
min_embed_sec = 3.0

# Minimum diarization mean-activity confidence for a span to be embedded
min_confidence = 0.5

# Retain one complete closing session so final alignment-driven evidence can
# revise early turns after the session gallery has matured.
retain_sec = 4000.0

# Speaker-id decision policy. Defaults preserve the current open-set behaviour:
# a clean span can match or enroll immediately. For reset-window experiments,
# raise cross_session_match_min_refs and set defer_unmatched_cross_session=true
# so uncertain later-session slots stay local-only instead of creating or
# stealing a global identity.
overlap_eps_sec = 0.1
max_ref_segs = 6
edge_margin_sec = 0.3
max_embed_window_sec = 10.0
enroll_min_refs = 1
speakers_per_session = 4
merge_threshold = 0.70
cosession_merge_threshold = 0.85
cross_session_match_min_refs = 1
defer_unmatched_cross_session = false

# Long sessions can reuse one diarizer-local slot for different real speakers.
# If a later clean voiceprint is inconsistent with the current local-slot
# epoch, split only the speaker-id mapping from that time onward. This preserves
# earlier timeline attribution while allowing the later epoch to match another
# known global speaker when the voiceprint supports it.
local_drift_threshold = 0.50
local_drift_min_span_sec = 5.0
local_drift_min_epoch_sec = 60.0
local_drift_allow_same_session_match = true
# Some local-slot drifts are still close to the original voiceprint, but are
# clearly closer to another known global id. In that case, split to the
# competing id if it beats the active epoch by this margin and does not overlap
# that id's current speech.
local_drift_competing_threshold = 0.72
local_drift_competing_margin = 0.08
local_drift_competing_min_span_sec = 3.0
local_drift_competing_candidate_threshold = 0.58
local_drift_competing_candidate_margin = 0.04
# Two independent candidate-strength spans can confirm one local-slot epoch
# change without lowering the strong single-span gate.
local_drift_competing_candidate_min_confirmations = 2
local_drift_competing_backfill_sec = 120.0
local_drift_competing_backfill_gap_sec = 4.0

# ══════════════════════════════════════════════════════════════════════════════
# Speaker evidence fusion — final multi-resolution TitaNet evidence
# ══════════════════════════════════════════════════════════════════════════════
[speaker_fusion]
enable = true
min_embed_sec = 0.4
edge_margin_sec = 0.0
max_embed_window_sec = 3.0
phrase_min_sec = 0.5
phrase_max_sec = 3.0
punctuation = "，。？！；：、,.?!;:"
frame_activity_threshold = 0.5
minimum_gallery_size = 3
short_max_sec = 1.5
short_min_score = 0.0
short_min_margin = 0.04
regular_min_score = 0.55
regular_min_margin = 0.04
four_view_min_aligned_units = 2
future_epoch_lookahead_sec = 120.0
# Spread acoustic-only TitaNet embedding extraction across idle points in the
# live session. Work starts only after the gallery is mature and all real-time
# producer pipelines have reached the common-clock head. Final gallery scoring
# and speaker selection still run after every producer drains. Set the interval
# to 0 only for an explicit uncached equivalence diagnostic.
precompute_interval_sec = 0.5
precompute_max_spans_per_cycle = 1

# ══════════════════════════════════════════════════════════════════════════════
# VAD — voice activity detection pipeline
# ══════════════════════════════════════════════════════════════════════════════
[vad]
# Silero VAD model path
model = "models/vad/silero_vad.safetensors"

# Enable VAD streaming pipeline
stream = true

# Speech probability threshold (0.0-1.0)
threshold = 0.5

# Minimum speech duration (ms) — shorter noise bursts are rejected
min_speech_ms = 250

# Minimum silence (ms) before VAD declares a segment end
# Larger = fewer VAD segments but more trailing silence (async lag)
# We tested: 300 (v7 default), 200 (more VAD splits)
min_silence_ms = 300

# Speech segment padding (ms) on each side
speech_pad_ms = 60

# ══════════════════════════════════════════════════════════════════════════════
# Diarization — speaker separation pipeline
# ══════════════════════════════════════════════════════════════════════════════
[diarizer]
# Spec 013 closing baseline. The deprecated v2 checkpoint has been removed.
# CLI overrides invalidate an acceptance run unless the resolved configuration
# is explicitly re-approved.
model_weights = "models/sortformer_4spk_v2.1.safetensors"

# Maximum number of speakers
max_speakers = 4

# Per-speaker activity threshold (0.0-1.0).  Lower = assigns more frames to speakers. (default 0.4, tuned)
threshold = 0.4

# Merge same-speaker segments closer than this (seconds).  Higher = fewer fragments. (default 0.8, tuned)
merge_gap_sec = 0.8

# Minimum audio interval between live speaker-view deliveries
deliver_interval_sec = 1.0

# Sortformer streaming tuning — affects speaker segmentation quality
# Speaker cache length (frames). Larger = more stable speaker identity, slower adaptation. (default 188)
# NOTE: this is the speaker-cache size declared by the checkpoint. In async
# mode the attention sequence also includes the occupied FIFO and current chunk;
# its scratch scales as O(T^2). Oversizing this value can therefore exhaust
# GPU/unified memory and stall the stream. Keep the checkpoint value unless both
# numerical parity and full-session resource behavior are revalidated.
spkcache_len = 188
# Processing chunk length in diarization frames. The NVIDIA streaming v2.1 checkpoint
# declares 188; 340 is Orator's current v2.1 closing baseline and is covered by
# the exact-profile NeMo oracle rather than treated as a checkpoint default.
# Experiments must use a separate TOML and cannot alter acceptance evidence.
chunk_len = 340
# Cache update interval (frames). Keep this at the model-trained default unless
# a dedicated full-stream accuracy review accepts a different value.
spkcache_update_period = 188
# Left context chunks. Higher = better context, more compute. (default 1)
chunk_left_context = 1
# Right context chunks. Keep at the model-trained default; high values were a
# transitional experiment and degraded local diar review quality.
chunk_right_context = 1
# Mean-silence placeholder frames retained per speaker during cache
# compression. This is the NVIDIA streaming v2.1 checkpoint value; it does not reset the
# cache or apply a separate silence-similarity penalty.
spkcache_sil_frames = 3

# FIFO length for NeMo's asynchronous streaming update. The checkpoint declares
# 0 (synchronous evaluation); 188 is the current v2.1 closing baseline and is
# covered by the exact model/profile oracle. Set to 0 only in a separate
# diagnostic TOML.
fifo_len = 188

# Onset/offset double-threshold post-processing (NeMo-style, default 0.45/0.35)
# onset: probability to START a segment. Higher = fewer, more confident segments.
# offset: probability to END a segment. Lower than onset creates "sticky" segments.
#   offset < onset means an active segment persists through probability dips.
onset = 0.45
offset = 0.35

# Extra time before/after each segment (seconds). (default 0.0)
pad_onset = 0.0
pad_offset = 0.0

# Minimum segment duration (seconds). Shorter segments are removed. (default 0.5)
min_dur_on = 0.5

# Minimum gap to merge same-speaker segments (seconds). Larger = fewer fragments. (default 1.0)
min_dur_off = 1.0

# Periodically reset the diarizer streaming state (seconds; 0 = never, DEFAULT).
# The reset was a workaround for the SYNC path (fifo_len=0), whose fixed speaker
# cache saturates over a long continuous session; it chopped the stream into
# fixed windows and re-stitched speaker slots across them with the voiceprint
# stage, which over-creates global ids (one real speaker fragments into several).
# The asynchronous path transfers FIFO overflow into the compressed speaker
# cache continuously, so the periodic reset remains disabled. Full-session
# speaker acceptance is still governed by Spec 013; this setting is not itself
# an accuracy claim. Leave at 0 unless a separately reviewed TOML says otherwise.
reset_period_sec = 0

# ══════════════════════════════════════════════════════════════════════════════
# Storage — protocol timeline persistence
# ══════════════════════════════════════════════════════════════════════════════
[storage]
# DISK backend path for protocol timeline
disk_path = "/tmp/orator/storage/"

# Session persistence directory. Empty = defaults to <disk_path>/sessions/
session_dir = ""

# ══════════════════════════════════════════════════════════════════════════════
# Telemetry — GPU scheduling metrics
# ══════════════════════════════════════════════════════════════════════════════
[telemetry]
# GPU telemetry push interval (seconds). 0 = disabled.
# For an offline observability run (tools/observability), set to e.g. 1.0 so the
# runtime emits periodic per-pipeline RTF / scheduling samples. Keep 0 in prod.
gpu_interval_sec = 1.0

# ══════════════════════════════════════════════════════════════════════════════
# Debug — diagnostics and profiling
# ══════════════════════════════════════════════════════════════════════════════
[debug]
# Log level: 0=DEBUG, 1=INFO, 2=WARN, 3=ERROR
log_level = 2

# Enable timebase consistency checks
timebase_check = false

# Show diarizer streaming progress bar
stream_progress = false

# GPU scheduling mode: "auto" (default), "serial", or "concurrent"
gpu_scheduling = "auto"

# Optional JSONL log of inbound/outbound WebSocket text frames. It may contain
# transcript text; keep empty outside an isolated diagnostic run.
ws_text_log_path = ""

# ══════════════════════════════════════════════════════════════════════════════
# Buffer — shared audio buffer configuration
# ══════════════════════════════════════════════════════════════════════════════
[buffer]
# Maximum buffer size in samples. 0 = no limit (default).
# Recommended: 32000000 (32M samples = 2s at 16kHz) for real-time streaming
# or 64000000 (64M samples = 4s at 16kHz) for higher tolerance to pipeline delays.
max_samples = 0

# Shrink-to-fit threshold in samples. When buffer capacity exceeds this,
# memory is reclaimed. Default: 10000000 (10M samples = ~40MB).
shrink_threshold = 10000000

# ══════════════════════════════════════════════════════════════════════════════
# Telemetry — cursor progress and health monitoring
# ══════════════════════════════════════════════════════════════════════════════
[telemetry.cursor]
# Enable cursor progress telemetry. 0 = disabled, >0 = interval in seconds.
# When enabled, periodic {"type":"cursor_progress",...} messages are sent.
# For an offline observability run set to e.g. 1.0 (per-pipeline backlog lane).
interval_sec = 1.0

# Maximum allowed lag in samples before warning. 0 = no limit.
lag_warn_samples = 0

# Maximum allowed lag in samples before critical. 0 = no limit.
lag_critical_samples = 0
