[speaker]
min_embed_sec = 0.4
edge_margin_sec = 0.0
max_embed_window_sec = 10.0

[speaker_fusion]
short_max_sec = 1.5
short_min_score = 0.0
short_min_margin = 0.04
regular_min_score = 0.55
regular_min_margin = 0.04

[vad_complete_contribution]
enabled = true
frame_activity_threshold = 0.5
minimum_stable_run_sec = 0.4
maximum_query_sec = 10.0
minimum_distinct_local_channels = 2
require_single_frozen_vad_segment = true
require_strict_native_duration_majority = true
require_dual_query_voiceprint_agreement = true
require_query_identity_equal_dominant_mapping = true
veto_dual_phrase_top_rank_for_different_identity = true
require_dual_clause_voiceprint_agreement = true
require_clause_identity_equal_vad_identity = true
require_selected_identity_already_in_clause = true
require_all_conflicting_fragments_dual_identity = true
project_complete_punctuation_clauses_per_source = true
require_complete_alignment_in_vad = true
require_actual_baseline_conflict = true
reject_conflicting_overlays = true
punctuation = "，。？！；：、,.?!;:"

[robust_gallery]
aggregation = "top_half_mean"
require_complete_gallery = true
