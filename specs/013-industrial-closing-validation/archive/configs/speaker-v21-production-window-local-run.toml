[speaker]
min_embed_sec = 0.4
edge_margin_sec = 0.0
max_embed_window_sec = 10.0

[speaker_fusion]
short_max_sec = 1.5
short_min_score = 0.0
short_min_margin = 0.04
regular_min_score = 0.55
regular_min_margin = 0.04

[posterior_bounded_phrase]
frame_activity_threshold = 0.5
minimum_sustained_run_sec = 0.4
minimum_piece_duration_sec = 0.4
regular_piece_min_sec = 1.5
preserve_regular_direct_anchors = true
allow_regular_consensus_over_short_anchor = true

[complete_local_phrase]
enabled = true
require_complete_punctuation_phrase = true
require_padded_vad_interval = true
require_single_top1_channel = true
require_uniform_known_baseline_identity = true
veto_any_different_session_voiceprint = true
veto_any_different_robust_voiceprint = true
veto_top_ranked_baseline_voiceprint = true
project_complete_phrase = true
minimum_phrase_sec = 0.4
maximum_phrase_sec = 10.0

[bounded_local_run_voiceprint]
enabled = true
require_complete_punctuation_phrase = true
require_same_top1_context = true
require_uniform_known_baseline_identity = true
require_dual_voiceprint_agreement = true
require_voiceprint_conflict_with_baseline = true
require_voiceprint_conflict_with_raw_local = true
require_selected_identity_active_raw_channel = true
allow_unanimous_top2_selected_channel = true
deterministic_max_window_query = true
project_complete_phrase = true
minimum_query_sec = 0.4
maximum_query_sec = 10.0
minimum_selected_channel_sec = 0.4

[robust_gallery]
aggregation = "top_half_mean"
require_complete_gallery = true

[complete_source_voiceprint]
enabled = true
require_single_indexed_phrase_in_source = true
require_complete_source_alignment_in_query = true
require_uniform_known_source_identity = true
reuse_bounded_local_run_voiceprint_decision = true
project_complete_asr_source = true
