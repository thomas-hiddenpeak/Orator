<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orator — Real-Time Transcription</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <h1>Orator</h1>
        <span class="subtitle">Real-Time Transcription</span>
      </div>
      <div class="topbar-right">
        <span id="connBadge" class="badge offline">● Disconnected</span>
      </div>
    </header>

    <div class="container">
      <!-- Input Control Panel -->
      <section class="panel input-panel">
        <div class="input-row">
          <button id="micBtn" class="btn btn-primary" disabled>
            <span class="btn-icon">&#x1F3A4;</span> Start Mic
          </button>
          <label class="btn btn-secondary" id="uploadBtn" disabled>
            <span class="btn-icon">&#x1F4C2;</span> Upload File
            <input type="file" id="fileInput" accept="audio/*" hidden />
          </label>
          <button id="flushBtn" class="btn btn-outline" disabled>
            <span class="btn-icon">&#x1F504;</span> Flush
          </button>
          <button id="endBtn" class="btn btn-warning" disabled>
            <span class="btn-icon">&#x23F9;</span> End
          </button>
          <button id="clearBtn" class="btn btn-outline" disabled>
            <span class="btn-icon">&#x1F5D1;</span> Clear
          </button>
        </div>
        <div class="vad-led-wrap">
          <span id="vadLed" class="vad-led">●</span>
          <span class="vad-led-label">VAD</span>
        </div>
        <div class="progress-row" id="progressRow" hidden>
          <span class="progress-label" id="durationLabel">00:00</span>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <span class="progress-label" id="statusLabel">Streaming...</span>
        </div>
      </section>

      <!-- Main Content -->
      <div class="main-grid">
        <!-- Transcript Panel (Left) -->
        <section class="panel transcript-panel">
          <h2 class="panel-title">Transcript</h2>
          <div id="transcriptList" class="transcript-list"></div>
          <div id="liveDraft" class="live-draft hidden">
            <span class="draft-pulse">&#x270F;</span>
            <span id="draftText"></span>
          </div>
        </section>

        <!-- Metrics Panel (Right) -->
        <section class="panel metrics-panel">
          <h2 class="panel-title">Metrics</h2>
          <div class="metrics-grid">
            <div class="metric-card">
              <span class="metric-label">Audio</span>
              <span class="metric-value" id="mAudio">-</span>
            </div>
            <div class="metric-card">
              <span class="metric-label">Sample Rate</span>
              <span class="metric-value" id="mSampleRate">-</span>
            </div>
            <div class="metric-card">
              <span class="metric-label">ASR RTF</span>
              <span class="metric-value" id="mAsrRtf">-</span>
            </div>
            <div class="metric-card">
              <span class="metric-label">Diar RTF</span>
              <span class="metric-value" id="mDiarRtf">-</span>
            </div>
            <div class="metric-card">
              <span class="metric-label">ASR Segments</span>
              <span class="metric-value" id="mAsrSeg">0</span>
            </div>
            <div class="metric-card">
              <span class="metric-label">Diar Segments</span>
              <span class="metric-value" id="mDiarSeg">0</span>
            </div>
            <div class="metric-card">
              <span class="metric-label">VAD RTF</span>
              <span class="metric-value" id="mVadRtf">-</span>
            </div>
            <div class="metric-card">
              <span class="metric-label">GPU Status</span>
              <span class="metric-value" id="mGpuStatus">-</span>
            </div>
          </div>
          <button id="downloadBtn" class="btn btn-outline btn-full hidden">
            <span class="btn-icon">&#x1F4E5;</span> Download JSON
          </button>
        </section>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
