<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orator Web UI</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Orator Web UI</h1>
      <div id="connStatus" class="status offline">Disconnected</div>
    </header>

    <section class="connect-panel card">
      <label for="wsUrl">WS URL</label>
      <input id="wsUrl" type="text" placeholder="ws://127.0.0.1:8765" />
      <button id="connectBtn">Connect</button>
      <button id="micBtn" disabled>Start Mic</button>
      <button id="flushBtn" disabled>Flush</button>
      <button id="endBtn" disabled>End</button>
      <button id="resetBtn" disabled>Reset</button>
      <span id="micState" class="mic-state">Mic: idle</span>
      <span id="wsState" class="ws-state">WS: idle</span>
    </section>

    <main class="grid">
      <section class="card">
        <h2>Realtime ASR</h2>
        <div id="asrList" class="log"></div>
      </section>

      <section class="card">
        <h2>Metrics</h2>
        <dl id="metrics" class="metrics">
          <dt>audio_sec</dt><dd>-</dd>
          <dt>sample_rate</dt><dd>-</dd>
          <dt>diar_rtf</dt><dd>-</dd>
          <dt>asr_rtf</dt><dd>-</dd>
          <dt>ws_ready</dt><dd>0</dd>
          <dt>asr_events</dt><dd>0</dd>
          <dt>timeline_events</dt><dd>0</dd>
          <dt>last_event</dt><dd>-</dd>
        </dl>
      </section>

      <section class="card span-2">
        <div class="timeline-header">
          <h2>Timeline (raw)</h2>
          <label class="auto-flush-label">
            <input type="checkbox" id="autoFlushChk" checked />
            Auto-flush every
            <input type="number" id="autoFlushSec" value="30" min="5" max="300" style="width:54px" />
            s
          </label>
          <span id="timelineSummary" class="timeline-summary">-</span>
        </div>
        <pre id="timelineRaw" class="raw">Click Flush or End — or enable Auto-flush — to receive timeline data.</pre>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
